name: 9Hits_Power_Bot
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install System Requirements
        run: bash setup.sh

      - name: Run 9Hits Viewer
        run: |
          curl -L https://9hits.com/downloads/v3/9hits-viewer-linux-x64.tar.bz2 | tar -xj
          chmod +x ./9hits-viewer-linux-x64/9hits-viewer
          
          # আপনার টোকেন দিয়ে সেশন রান
          ./9hits-viewer-linux-x64/9hits-viewer --token=08aa8c374e5713f7a572bae472c75cc4 --allow-ca --session=s1 &
          ./9hits-viewer-linux-x64/9hits-viewer --token=08aa8c374e5713f7a572bae472c75cc4 --allow-ca --session=s2
          
          sleep 340m

